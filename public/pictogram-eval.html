    function renderTile(item){if(!item.pictogram){return '<div class="tile"><div class="placeholder">?</div><strong>'+escapeHtml(item.token)+'</strong><small>未找到</small></div>'}return '<div class="tile"><img src="'+item.pictogram.imageUrl+'" alt="'+escapeHtml(item.pictogram.label)+'" loading="lazy" /><strong>'+escapeHtml(item.token)+'</strong><small>'+escapeHtml(item.pictogram.label)+'</small></div>'}
    function renderAttempts(item){return '<div class="attempts">'+item.attempts.map((a)=>'<div class="attempt"><div class="attempt-head"><strong>第 '+a.round+' 轮</strong><span class="badge '+(a.missingTokens.length?'missing':'complete')+'">'+(a.missingTokens.length?'缺 '+a.missingTokens.length:'全命中')+'</span></div><p>'+escapeHtml(a.sentence)+'</p><div class="tokens">'+a.tokens.map((t)=>'<span class="token '+(a.missingTokens.includes(t)?'miss':'')+'">'+escapeHtml(t)+'</span>').join('')+'</div></div>').join('')+'</div>'}
    function renderCase(item,index){const saved=state[item.id]||{};const missingLabel=item.missingTokens.length?'最终缺词：'+item.missingTokens.join(' / '):'最终全部命中';const directionSet=new Set(saved.directions||[]);return '<article class="case" id="'+item.id+'"><div class="case-head"><div><span class="badge">'+String(index+1).padStart(2,'0')+' · '+escapeHtml(item.scene)+'</span><p class="sentence">'+escapeHtml(item.original)+'</p><p class="basis">最终改写：'+escapeHtml(item.finalText)+'</p><p class="basis">依据：'+escapeHtml(item.basis)+'</p></div><span class="badge '+(item.missingTokens.length?'missing':'complete')+'">'+escapeHtml(missingLabel)+' · '+item.attempts.length+' 轮</span></div><div class="content"><div><h2>最终图片序列</h2><div class="sequence">'+item.items.map(renderTile).join('')+'</div></div><div class="eval">'+renderAttempts(item)+'<div class="field"><label for="score-'+item.id+'">满意程度</label><select id="score-'+item.id+'" data-id="'+item.id+'" data-field="score"><option value="">未评分</option>'+[1,2,3,4,5].map((n)=>'<option value="'+n+'" '+(String(saved.score||'')===String(n)?'selected':'')+'>'+n+' 分</option>').join('')+'</select></div><div class="field"><label>优化方向</label><div class="chips">'+directions.map((d)=>'<label class="chip"><input type="checkbox" data-id="'+item.id+'" data-direction="'+escapeHtml(d)+'" '+(directionSet.has(d)?'checked':'')+' /><span>'+escapeHtml(d)+'</span></label>').join('')+'</div></div><div class="field"><label for="note-'+item.id+'">你的备注</label><textarea id="note-'+item.id+'" data-id="'+item.id+'" data-field="note" placeholder="例如：第二轮语义变弱、图片不直观、顺序不对……">'+escapeHtml(saved.note||'')+'</textarea></div></div></div><div class="foot"><span>Final tokens: '+escapeHtml(item.tokens.join(' / '))+'</span><span>'+escapeHtml(item.id)+'</span></div></article>'}
    function renderCases(){document.getElementById('cases').innerHTML=CASES.map(renderCase).join('')} document.addEventListener('change',(event)=>{const target=event.target;const id=target.dataset.id;if(!id)return;state[id]||={};if(target.dataset.field==='score')state[id].score=target.value;if(target.dataset.direction){const values=new Set(state[id].directions||[]);if(target.checked)values.add(target.dataset.direction);else values.delete(target.dataset.direction);state[id].directions=Array.from(values)}save()});document.addEventListener('input',(event)=>{const target=event.target;const id=target.dataset.id;if(!id||target.dataset.field!=='note')return;state[id]||={};state[id].note=target.value;save()});document.getElementById('syncBtn').addEventListener('click',syncJsonNow);document.getElementById('exportBtn').addEventListener('click',()=>{const payload=buildPayload();const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='pictogram-sequence-evaluation.json';a.click();URL.revokeObjectURL(url)});document.getElementById('resetBtn').addEventListener('click',()=>{if(!confirm('清空当前浏览器里的所有评分和备注？'))return;for(const key of Object.keys(state))delete state[key];localStorage.removeItem(STORAGE_KEY);syncJsonNow().finally(()=>location.reload())});renderSources();renderSummary();renderCases();syncJsonNow();
  </script>
</body>
</html>
