<head>

      --line: #e5e7eb;

      --soft: #f3f4f6;

      --bad-bg: #fef2f2;

      --ok-bg: #f0fdf4;
      --warn: #92400e;

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    header { position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(229, 231, 235, 0.9); background: rgba(245, 245, 247, 0.92); backdrop-filter: blur(16px); }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 18px; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    h1 { margin: 0; font-size: 24px; line-height: 1.2; letter-spacing: 0; }
    h2 { margin: 0; font-size: 18px; line-height: 1.35; letter-spacing: 0; }
    h3 { margin: 0; font-size: 15px; line-height: 1.35; letter-spacing: 0; }
    p { line-height: 1.6; }
    .sub { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button, select, textarea, input { font: inherit; }
    button { min-height: 44px; border: 0; border-radius: 999px; padding: 10px 16px; background: var(--accent); color: #fff; cursor: pointer; }
    button.secondary { background: #fff; color: var(--text); box-shadow: inset 0 0 0 1px var(--line); }
    button:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible, input:focus-visible + span { outline: 3px solid rgba(37, 99, 235, 0.28); outline-offset: 2px; }
    main.wrap { display: grid; gap: 16px; padding-top: 18px; }
    .summary { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; }
    .metric { border: 1px solid var(--line); border-radius: 18px; background: var(--panel); padding: 14px; }
    .metric strong { display: block; font-size: 22px; margin-bottom: 2px; }
    .metric span { color: var(--muted); font-size: 13px; }
    .sources, .case { border: 1px solid var(--line); border-radius: 22px; background: var(--panel); box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04); }
    .sources { padding: 16px; }
    .source-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .source-list a { color: var(--text); text-decoration: none; background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 8px 11px; font-size: 13px; }
    #cases { display: grid; gap: 16px; }
    .case { overflow: hidden; }
    .case-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: start; padding: 18px; border-bottom: 1px solid var(--line); }
    .badge { display: inline-flex; align-items: center; min-height: 28px; border-radius: 999px; padding: 4px 10px; background: #fff; color: var(--muted); border: 1px solid var(--line); font-size: 13px; white-space: nowrap; }
    .sentence { margin: 10px 0 0; font-size: 20px; font-weight: 650; line-height: 1.35; }
    .basis { margin: 8px 0 0; color: var(--muted); font-size: 13px; }
    .missing { color: var(--bad); background: var(--bad-bg); border-color: #fecaca; }
    .complete { color: var(--ok); background: var(--ok-bg); border-color: #bbf7d0; }
    .content { display: grid; grid-template-columns: minmax(0, 1.18fr) minmax(320px, 0.82fr); gap: 18px; padding: 18px; }
    .sequence { display: grid; grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 12px; align-content: start; margin-top: 12px; }
    .tile { min-height: 164px; border: 1px solid var(--line); border-radius: 16px; background: #fff; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; gap: 8px; }
    .tile img { width: 86px; height: 86px; object-fit: contain; display: block; }
    .tile .placeholder { width: 86px; height: 86px; border-radius: 16px; background: var(--bad-bg); color: var(--bad); display: grid; place-items: center; font-size: 28px; font-weight: 700; }
    .tile strong { max-width: 100%; font-size: 15px; line-height: 1.2; text-align: center; overflow-wrap: anywhere; }
    .tile small { color: var(--muted); font-size: 12px; text-align: center; overflow-wrap: anywhere; }
    .eval { display: grid; gap: 12px; align-content: start; }
    .panel { border: 1px solid var(--line); border-radius: 16px; background: #fff; padding: 12px; }
    .panel p { margin: 8px 0 0; color: var(--muted); font-size: 13px; }
    .attempts { display: grid; gap: 8px; }
    .attempt { border: 1px solid var(--line); border-radius: 14px; background: #fff; padding: 10px; }
    .attempt-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .attempt strong { font-size: 13px; }
    .chips, .concepts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .pill { border-radius: 999px; background: var(--soft); padding: 5px 8px; font-size: 12px; color: #374151; overflow-wrap: anywhere; }
    .pill.warn { background: var(--warn-bg); color: var(--warn); }
    .pill.miss { background: var(--bad-bg); color: var(--bad); }
    .field { display: grid; gap: 7px; }
    label { font-size: 13px; color: var(--muted); }
    select, textarea { width: 100%; border: 1px solid var(--line); border-radius: 14px; background: #fff; color: var(--text); padding: 11px 12px; outline: none; min-height: 44px; }
    textarea { resize: vertical; min-height: 86px; line-height: 1.5; }
    select:focus, textarea:focus { border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.2); }
    .choice { position: relative; }
    .choice input { position: absolute; opacity: 0; pointer-events: none; }
    .choice span { display: inline-flex; align-items: center; min-height: 38px; border: 1px solid var(--line); border-radius: 999px; padding: 7px 11px; background: #fff; font-size: 13px; cursor: pointer; }
    .choice input:checked + span { border-color: #111827; background: #111827; color: #fff; }
    .foot { display: flex; justify-content: space-between; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; padding: 0 18px 18px; }
    @media (max-width: 820px) {
      .top, .case-head, .content { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      h1 { font-size: 21px; }
      .sentence { font-size: 18px; }
      .wrap { padding-left: 12px; padding-right: 12px; }
      .badge { white-space: normal; }
    }
  </style>
</head>

    const STORAGE_KEY = 'picinterpreter:pictogram-eval:v3';
    const SYNC_API_PATH = '/api/pictogram-eval-results';
    const directions = ['换更具体的图', '减少图片数量', '补充图库词', '保留更多语义', '顺序要调整', '校验图片含义'];
    const state = { ...{
    "daily-01": {},
    "daily-02": {},
    "daily-03": {},
    "daily-04": {},
    "daily-05": {},
    "daily-06": {},
    "daily-07": {},

    "daily-23": {},

    "daily-25": {},

    "daily-29": {},
    "daily-30": {},

    "daily-37": {},
    "daily-38": {},
    "daily-39": {},
    "daily-40": {},
    "daily-41": {}
}, ...JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') };
    let saveTimer = null;

    function buildPayload() {
      return CASES.map((item) => ({
        id: item.id,
        scene: item.scene,
        original: item.original,
        finalText: item.finalText,
        intent: item.intent,
        basis: item.basis,
        attempts: item.attempts,
        concepts: item.concepts,
        missingConcepts: item.missingConcepts,
        sequence: item.items,
        evaluation: state[item.id] || {},
      }));
    }

    function getSyncEndpoint() {
      if (window.location.protocol === 'file:') return 'http://localhost:3001' + SYNC_API_PATH;
      return SYNC_API_PATH;
    }

    async function syncJsonNow() {
      const btn = document.getElementById('syncBtn');
      if (btn) btn.textContent = '同步中';
      try {
        const response = await fetch(getSyncEndpoint(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cases: buildPayload(), evaluations: state }),
        });
        if (!response.ok) throw new Error('sync failed');
        if (btn) btn.textContent = '已同步';
      } catch {
        if (btn) btn.textContent = window.location.protocol === 'file:' ? '请启动服务' : '同步失败';
      } finally {
        setTimeout(() => { if (btn) btn.textContent = '同步 JSON'; }, 1800);
      }
    }

    function scheduleSync() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(syncJsonNow, 500);
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderSummary();
      scheduleSync();
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function renderSources() {
      document.getElementById('sources').innerHTML = SOURCES.map((source) =>
        '<a href="' + source.url + '" target="_blank" rel="noreferrer">' + escapeHtml(source.label) + ' · ' + escapeHtml(source.note) + '</a>'
      ).join('');
    }

    function renderSummary() {
      const rated = CASES.filter((item) => state[item.id]?.score).length;
      const scores = CASES.map((item) => Number(state[item.id]?.score || 0)).filter(Boolean);
      const avg = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '-';
      const missing = CASES.reduce((sum, item) => sum + item.missingConcepts.length, 0);
      const complete = CASES.filter((item) => item.missingConcepts.length === 0).length;
      const rounds = (CASES.reduce((sum, item) => sum + item.attempts.length, 0) / CASES.length).toFixed(1);
      const metrics = [
        [String(CASES.length), '测试场景'],
        [rated + '/' + CASES.length, '已评分'],
        [avg, '平均满意度'],
        [complete + '/' + CASES.length, '无缺失概念'],
        [rounds, '平均迭代轮次'],
        [String(missing), '最终缺失概念'],
      ];
      document.getElementById('summary').innerHTML = metrics.map(([value, label]) => '<div class="metric"><strong>' + value + '</strong><span>' + label + '</span></div>').join('');
    }

    function renderTile(item) {
      if (!item.pictogram) {
        return '<div class="tile"><div class="placeholder">?</div><strong>' + escapeHtml(item.concept) + '</strong><small>未找到</small></div>';
      }
      return '<div class="tile"><img src="' + item.pictogram.imageUrl + '" alt="' + escapeHtml(item.concept + '：' + item.pictogram.label) + '" loading="lazy" width="86" height="86" /><strong>' + escapeHtml(item.concept) + '</strong><small>' + escapeHtml(item.pictogram.label) + ' · ' + escapeHtml(item.pictogram.arasaacId) + '</small></div>';
    }

    function renderSearchQueries(queries) {
      return queries.map((query) => Object.entries(query).map(([key, value]) => key + ': ' + value).join(' / '));
    }

    function renderAttempts(item) {
      return '<div class="attempts">' + item.attempts.map((attempt, index) => {
        const missing = attempt.missingConcepts || [];
        const rejected = attempt.rejected || [];
        return '<div class="attempt"><div class="attempt-head"><strong>迭代 ' + (index + 1) + '</strong><span class="badge ' + (missing.length ? 'missing' : 'complete') + '">' + (missing.length ? '缺 ' + missing.length : '已校验') + '</span></div>' +
          '<p class="basis">搜索：' + escapeHtml(renderSearchQueries(attempt.searchQueries).join('；')) + '</p>' +
          '<div class="concepts">' + attempt.candidateIds.map((id) => '<span class="pill">#' + escapeHtml(id) + '</span>').join('') + '</div>' +
          '<p class="basis">草案：' + escapeHtml(attempt.draftedSequence.join(' / ')) + '</p>' +
          (rejected.length ? '<p class="basis">拒绝：' + rejected.map((item) => '#' + escapeHtml(item.id) + ' ' + escapeHtml(item.reason)).join('；') + '</p>' : '') +
          (missing.length ? '<div class="concepts">' + missing.map((concept) => '<span class="pill miss">' + escapeHtml(concept) + '</span>').join('') + '</div>' : '') +
          '</div>';
      }).join('') + '</div>';
    }

    function renderVerification(item) {
      return '<div class="panel"><h3>读图校验</h3><div class="concepts">' + item.items.map((entry) => '<span class="pill">' + escapeHtml(entry.concept) + '：' + escapeHtml(entry.verification) + '</span>').join('') + '</div></div>';
    }

    function renderCase(item, index) {
      const saved = state[item.id] || {};
      const missingLabel = item.missingConcepts.length ? '缺失：' + item.missingConcepts.join(' / ') : '无缺失概念';
      const directionSet = new Set(saved.directions || []);
      return '<article class="case" id="' + item.id + '"><div class="case-head"><div><span class="badge">' + String(index + 1).padStart(2, '0') + ' · ' + escapeHtml(item.scene) + '</span><p class="sentence">' + escapeHtml(item.original) + '</p><p class="basis">整句意图：' + escapeHtml(item.intent) + '</p><p class="basis">最终表达：' + escapeHtml(item.finalText) + '</p><p class="basis">依据：' + escapeHtml(item.basis) + '</p></div><span class="badge ' + (item.missingConcepts.length ? 'missing' : 'complete') + '">' + escapeHtml(missingLabel) + ' · ' + item.attempts.length + ' 轮</span></div>' +
        '<div class="content"><div><h2>最终图片序列</h2><div class="sequence">' + item.items.map(renderTile).join('') + '</div></div><div class="eval">' + renderAttempts(item) + renderVerification(item) +
        '<div class="field"><label for="score-' + item.id + '">满意程度</label><select id="score-' + item.id + '" data-id="' + item.id + '" data-field="score"><option value="">未评分</option>' + [1, 2, 3, 4, 5].map((n) => '<option value="' + n + '" ' + (String(saved.score || '') === String(n) ? 'selected' : '') + '>' + n + ' 分</option>').join('') + '</select></div>' +
        '<div class="field"><label>优化方向</label><div class="chips">' + directions.map((direction) => '<label class="choice"><input type="checkbox" data-id="' + item.id + '" data-direction="' + escapeHtml(direction) + '" ' + (directionSet.has(direction) ? 'checked' : '') + ' /><span>' + escapeHtml(direction) + '</span></label>').join('') + '</div></div>' +
        '<div class="field"><label for="note-' + item.id + '">你的备注</label><textarea id="note-' + item.id + '" data-id="' + item.id + '" data-field="note" placeholder="例如：图片语义不够直观、顺序还要调整、缺少更具体图库词……">' + escapeHtml(saved.note || '') + '</textarea></div></div></div>' +
        '<div class="foot"><span>图片概念：' + escapeHtml(item.concepts.join(' / ')) + '</span><span>' + escapeHtml(item.id) + '</span></div></article>';
    }

    function renderCases() {
      document.getElementById('cases').innerHTML = CASES.map(renderCase).join('');
    }

    document.addEventListener('change', (event) => {
      const target = event.target;
      const id = target.dataset.id;
      if (!id) return;
      state[id] ||= {};
      if (target.dataset.field === 'score') state[id].score = target.value;
      if (target.dataset.direction) {
        const values = new Set(state[id].directions || []);
        if (target.checked) values.add(target.dataset.direction);
        else values.delete(target.dataset.direction);
        state[id].directions = Array.from(values);
      }
      save();
    });

    document.addEventListener('input', (event) => {
      const target = event.target;
      const id = target.dataset.id;
      if (!id || target.dataset.field !== 'note') return;
      state[id] ||= {};
      state[id].note = target.value;
      save();
    });

    document.getElementById('syncBtn').addEventListener('click', syncJsonNow);
    document.getElementById('exportBtn').addEventListener('click', () => {
      const payload = buildPayload();
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'pictogram-sequence-evaluation.json';
      a.click();
      URL.revokeObjectURL(url);
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
      if (!confirm('清空当前浏览器里的所有评分和备注？')) return;
      for (const key of Object.keys(state)) delete state[key];
      localStorage.removeItem(STORAGE_KEY);
      syncJsonNow().finally(() => location.reload());
    });

    renderSources();
    renderSummary();
    renderCases();
  </script>
